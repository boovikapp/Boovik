<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boovik — לוח בעלים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root {
  --blue-dark: #0f2a5e;
  --blue: #1a3a8f;
  --blue-mid: #1e56d6;
  --cyan: #00c6f8;
  --bg: #f4f7fb;
  --text: #0d1f4e;
  --gray: #64748b;
  --border: #e2e8f0;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Heebo', sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }

/* LOGIN */
.login-page {
  min-height: 100vh;
  background: linear-gradient(160deg, #0a1e52, #1e56d6);
  display: flex; align-items: center; justify-content: center; padding: 24px;
}

.login-card {
  background: white; border-radius: 20px; padding: 36px 28px;
  width: 100%; max-width: 380px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.3);
}

.login-logo { text-align: center; margin-bottom: 8px; font-size: 28px; font-weight: 900; direction: ltr; }
.login-logo span { color: var(--blue-mid); }
.login-sub { text-align: center; font-size: 13px; color: var(--gray); margin-bottom: 28px; }

.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block; }
.form-input { width: 100%; border: 2px solid var(--border); border-radius: 12px; padding: 12px 16px; font-family: 'Heebo', sans-serif; font-size: 15px; outline: none; }
.form-input:focus { border-color: var(--blue-mid); }

.btn-login { width: 100%; background: linear-gradient(135deg, var(--blue-mid), #3b7ef8); color: white; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Heebo', sans-serif; }
.error-msg { background: #fef2f2; border-radius: 10px; padding: 10px; font-size: 13px; color: var(--danger); margin-bottom: 14px; display: none; }

/* DASHBOARD */
.dash-header {
  background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
  padding: 20px 24px;
  display: flex; align-items: center; justify-content: space-between;
  color: white;
}

.dash-logo { font-size: 20px; font-weight: 900; direction: ltr; }
.dash-logo span { color: var(--cyan); }
.dash-title { font-size: 14px; opacity: 0.8; margin-top: 2px; }

.logout-btn { background: rgba(255,255,255,0.15); border: none; color: white; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Heebo', sans-serif; }

.main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-box { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(30,86,214,0.06); text-align: center; }
.stat-num { font-size: 32px; font-weight: 900; color: var(--blue-mid); }
.stat-label { font-size: 12px; color: var(--gray); margin-top: 4px; }

/* BUSINESSES TABLE */
.card { background: white; border-radius: 18px; padding: 22px; box-shadow: 0 2px 12px rgba(30,86,214,0.06); margin-bottom: 20px; }
.card-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; color: var(--blue-dark); }

.biz-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
.biz-item:last-child { border-bottom: none; }

.biz-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, var(--blue-mid), var(--cyan)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; color: white; font-weight: 800; }
.biz-info { flex: 1; }
.biz-name { font-size: 15px; font-weight: 700; }
.biz-meta { font-size: 12px; color: var(--gray); margin-top: 3px; }

.trial-bar { width: 80px; }
.trial-label { font-size: 11px; color: var(--gray); margin-bottom: 4px; text-align: center; }
.trial-progress { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.trial-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

.status-badge { font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 20px; white-space: nowrap; }
.status-trial { background: #fef3c7; color: #d97706; }
.status-paying { background: #d1fae5; color: #059669; }
.status-expired { background: #fef2f2; color: var(--danger); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">Boo<span>vik</span></div>
      <div class="login-sub">🔐 לוח בעלים — גישה מוגבלת</div>
      <div class="error-msg" id="error-msg"></div>
      <div class="form-group">
        <label class="form-label">סיסמת בעלים</label>
        <input type="password" id="owner-password" class="form-input" placeholder="הכנס סיסמא" dir="ltr" onkeydown="if(event.key==='Enter')checkPassword()">
      </div>
      <button class="btn-login" onclick="checkPassword()">כניסה</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen" style="display:none">
  <div class="dash-header">
    <div>
      <div class="dash-logo">Boo<span>vik</span></div>
      <div class="dash-title">🎛️ לוח בעלים</div>
    </div>
    <button class="logout-btn" onclick="logout()">יציאה</button>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="total-biz">0</div><div class="stat-label">עסקים רשומים</div></div>
      <div class="stat-box"><div class="stat-num" id="trial-biz">0</div><div class="stat-label">בתקופת ניסיון</div></div>
      <div class="stat-box"><div class="stat-num" id="paying-biz">0</div><div class="stat-label">לקוחות משלמים</div></div>
      <div class="stat-box"><div class="stat-num" id="monthly-revenue">₪0</div><div class="stat-label">הכנסה חודשית</div></div>
    </div>

    <div class="card">
      <div class="card-title">🏪 כל העסקים</div>
      <div id="businesses-list">
        <div style="text-align:center;padding:40px;color:var(--gray);">טוען...</div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dgzczueweiyhafmbnhgc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnemN6dWV3ZWl5aGFmbWJuaGdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMzQyMjEsImV4cCI6MjA5NTkxMDIyMX0.02a2WG3XKMwGWrKCp48DlC5ZRRDYqoky9Qdz-jqXy3I';

// סיסמת בעלים — שנה אותה!
const OWNER_PASSWORD = 'Boovik2025!';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const nicheLabels = { hair:'שיער', nails:'ציפורניים', beauty:'קוסמטיקה', fitness:'כושר', therapy:'טיפול', other:'אחר' };
const nicheEmojis = { hair:'✂️', nails:'💅', beauty:'💄', fitness:'💪', therapy:'🧠', other:'🏪' };

function checkPassword() {
  const pwd = document.getElementById('owner-password').value;
  if (pwd === OWNER_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    loadDashboard();
  } else {
    const err = document.getElementById('error-msg');
    err.textContent = '❌ סיסמא שגויה';
    err.style.display = 'block';
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('owner-password').value = '';
}

async function loadDashboard() {
  const { data: businesses } = await db.from('businesses').select('*').order('created_at', { ascending: false });
  if (!businesses) return;

  const now = new Date();
  let trialCount = 0;
  let payingCount = 0;

  businesses.forEach(biz => {
    const created = new Date(biz.created_at);
    const daysSince = Math.floor((now - created) / (1000 * 60 * 60 * 24));
    if (biz.is_paying) { payingCount++; }
    else if (daysSince <= 30) { trialCount++; }
  });

  document.getElementById('total-biz').textContent = businesses.length;
  document.getElementById('trial-biz').textContent = trialCount;
  document.getElementById('paying-biz').textContent = payingCount;
  document.getElementById('monthly-revenue').textContent = `₪${payingCount * 129}`;

  const el = document.getElementById('businesses-list');
  if (businesses.length === 0) {
    el.innerHTML = `<div style="text-align:center;padding:40px;color:var(--gray);">אין עסקים עדיין</div>`;
    return;
  }

  el.innerHTML = businesses.map(biz => {
    const created = new Date(biz.created_at);
    const daysSince = Math.floor((now - created) / (1000 * 60 * 60 * 24));
    const daysLeft = Math.max(0, 30 - daysSince);
    const trialPercent = Math.min(100, (daysSince / 30) * 100);
    const niche = biz.niche || 'other';

    let statusHtml = '';
    let trialHtml = '';

    if (biz.is_paying) {
      statusHtml = `<span class="status-badge status-paying">✅ משלם</span>`;
    } else if (daysSince <= 30) {
      statusHtml = `<span class="status-badge status-trial">⏳ ניסיון</span>`;
      trialHtml = `
        <div class="trial-bar">
          <div class="trial-label">יום ${daysSince}/30</div>
          <div class="trial-progress">
            <div class="trial-fill" style="width:${trialPercent}%;background:${trialPercent > 80 ? '#ef4444' : '#f59e0b'};"></div>
          </div>
        </div>
      `;
    } else {
      statusHtml = `<span class="status-badge status-expired">⚠️ פג ניסיון</span>`;
    }

    return `
      <div class="biz-item">
        <div class="biz-avatar">${nicheEmojis[niche]}</div>
        <div class="biz-info">
          <div class="biz-name">${biz.name}</div>
          <div class="biz-meta">📞 ${biz.phone || '—'} · ${nicheLabels[niche]} · נרשם ${created.getDate()}/${created.getMonth()+1}/${created.getFullYear()}</div>
        </div>
        ${trialHtml}
        ${statusHtml}
      </div>
    `;
  }).join('');
}
</script>
</body>
</html>
